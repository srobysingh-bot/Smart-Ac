name: HawaAI AC Optimizer
version: 1.1.16
slug: hawaai
description: AI-powered AC optimization using presence, temperature, and energy data
url: https://github.com/srobysingh-bot/Smart-Ac
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
auto_update: true
homeassistant_api: true
hassio_api: true
homeassistant: "2023.1.0"
panel_icon: mdi:air-conditioner
panel_title: HawaAI
ingress: true
ingress_port: 8099
options:
  weather_api_key: ""
  weather_city: ""
  weather_provider: "openweathermap"
  target_temp: 24
  hysteresis: 1.5
  vacancy_timeout_minutes: 5
  energy_tariff_per_kwh: 8.0
  logic_interval_seconds: 60
  currency: "INR"
  presence_entity: ""
  indoor_temp_entity: ""
  climate_entity: ""
  energy_power_entity: ""
  energy_kwh_entity: ""
  broadlink_entity: ""
  ir_device_name: ""
  ir_command_on: ""
  ir_command_off: ""
  ac_brand: ""
  ac_model: ""
  room_name: "Living Room"
  use_presence: true
  use_outdoor_temp: true
  smart_temp_adjustment: false
  manual_override: false
schema:
  weather_api_key: password?
  weather_city: str?
  weather_provider: str
  target_temp: int
  hysteresis: float
  vacancy_timeout_minutes: int
  energy_tariff_per_kwh: float
  logic_interval_seconds: int
  currency: str
  presence_entity: str?
  indoor_temp_entity: str?
  climate_entity: str?
  energy_power_entity: str?
  energy_kwh_entity: str?
  broadlink_entity: str?
  ir_device_name: str?
  ir_command_on: str?
  ir_command_off: str?
  ac_brand: str?
  ac_model: str?
  room_name: str
  use_presence: bool
  use_outdoor_temp: bool
  smart_temp_adjustment: bool
  manual_override: bool
map:
  - data:rw
